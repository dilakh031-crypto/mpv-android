name: build

on:
  - push
  - pull_request

env:
  CI_ANDROID_ARCH: arm64
  CI_ANDROID_ABI: arm64-v8a
  MPV_ANDROID_GHA_DEFAULT_ARM64_RELEASE: "1"

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Export env vars
        run: buildscripts/include/ci.sh export >>$GITHUB_ENV

      - uses: actions/cache@v5
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}"
          enableCrossOsArchive: true

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install autoconf pkgconf libtool ninja-build python3-pip gperf
          sudo pip3 install meson

      - name: Download deps
        run: |
          mkdir -p "$CACHE_FOLDER"
          buildscripts/include/ci.sh install
        env:
          CACHE_MODE: "folder"
          CACHE_FOLDER: "${{ github.workspace }}/gh-cache"

      - name: Prepare release signing key
        run: |
          if [ -z "${ANDROID_SIGNING_KEY_BASE64}" ]; then
            echo "ANDROID_SIGNING_KEY_BASE64 secret is required to sign the default arm64-v8a release APK." >&2
            exit 1
          fi
          printf '%s' "${ANDROID_SIGNING_KEY_BASE64}" | base64 -d > "${ANDROID_SIGNING_KEY}"
          chmod 600 "${ANDROID_SIGNING_KEY}"
        env:
          ANDROID_SIGNING_KEY_BASE64: "${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}"
          ANDROID_SIGNING_KEY: "${{ runner.temp }}/mpv-android-release.jks"

      - name: Build default arm64-v8a release
        run: |
          buildscripts/include/ci.sh build
        env:
          ANDROID_SIGNING_KEY: "${{ runner.temp }}/mpv-android-release.jks"
          ANDROID_SIGNING_ALIAS: "${{ secrets.ANDROID_SIGNING_ALIAS }}"
          ANDROID_SIGNING_STORE_PASSWORD: "${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}"
          ANDROID_SIGNING_KEY_PASSWORD: "${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}"

      - uses: actions/upload-artifact@v7
        with:
          name: mpv-android-default-arm64-v8a-release
          path: app/build/outputs/apk/default/release/app-default-arm64-v8a-release-signed.apk
          if-no-files-found: error
