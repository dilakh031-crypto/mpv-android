name: build

on:
  - push
  - pull_request

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Export env vars
        run: buildscripts/include/ci.sh export >>$GITHUB_ENV

      - uses: actions/cache@v5
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}-arm64"
          enableCrossOsArchive: true

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install autoconf pkgconf libtool ninja-build python3-pip gperf
          sudo pip3 install meson

      - name: Download deps
        run: |
          export WGET="wget --progress=bar:force"
          export IN_CI=1
          export CACHE_FOLDER="${{ github.workspace }}/gh-cache"

          mkdir -p "$CACHE_FOLDER"
          cd buildscripts

          if [[ -n "$ANDROID_HOME" && -d "$ANDROID_HOME" ]]; then
            mkdir -p sdk
            ln -sv "$ANDROID_HOME" sdk/android-sdk-linux
          fi

          ./include/download-sdk.sh

          mkdir -p deps/mpv
          $WGET https://github.com/mpv-player/mpv/archive/master.tar.gz -O master.tgz
          tar -xzf master.tgz -C deps/mpv --strip-components=1
          rm master.tgz

          mkdir -p prefix
          cache_id="${CACHE_IDENTIFIER}-arm64"
          if [[ -f "$CACHE_FOLDER/id.txt" && "$(cat "$CACHE_FOLDER/id.txt")" == "$cache_id" ]]; then
            tar -xzf "$CACHE_FOLDER/data.tgz" -C prefix
          else
            ./buildall.sh --only-deps --arch arm64 mpv
            tar -czf "$CACHE_FOLDER/data.tgz" -C prefix .
            echo "$cache_id" >"$CACHE_FOLDER/id.txt"
          fi

      - name: Build
        run: |
          ./buildscripts/buildall.sh --arch arm64 -n mpv

          source buildscripts/include/path.sh
          PREFIX64="${{ github.workspace }}/buildscripts/prefix/arm64" \
            ndk-build -C app/src/main -j$(nproc)

          sed -i 's/universalApk true/universalApk false/' app/build.gradle
          ./gradlew :app:assembleDefaultRelease -Pandroid.injected.build.abi=arm64-v8a

      - name: Sign
        run: |
          : "${ANDROID_SIGNING_KEY:?Missing secret ANDROID_SIGNING_KEY}"
          : "${ANDROID_SIGNING_ALIAS:?Missing secret ANDROID_SIGNING_ALIAS}"
          : "${ANDROID_SIGNING_STORE_PASSWORD:?Missing secret ANDROID_SIGNING_STORE_PASSWORD}"

          source buildscripts/include/depinfo.sh

          key_pass="${ANDROID_SIGNING_KEY_PASSWORD:-$ANDROID_SIGNING_STORE_PASSWORD}"
          keystore="${{ runner.temp }}/release.keystore"
          unsigned="app/build/outputs/apk/default/release/app-default-arm64-v8a-release-unsigned.apk"
          signed="app/build/outputs/apk/default/release/app-default-arm64-v8a-release-signed.apk"
          apksigner="buildscripts/sdk/android-sdk-linux/build-tools/${v_sdk_build_tools}/apksigner"

          printf '%s' "$ANDROID_SIGNING_KEY" | base64 --decode > "$keystore"

          "$apksigner" sign \
            --ks "$keystore" \
            --ks-key-alias "$ANDROID_SIGNING_ALIAS" \
            --ks-pass "pass:$ANDROID_SIGNING_STORE_PASSWORD" \
            --key-pass "pass:$key_pass" \
            --out "$signed" \
            "$unsigned"

          "$apksigner" verify "$signed"
        env:
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          ANDROID_SIGNING_ALIAS: ${{ secrets.ANDROID_SIGNING_ALIAS }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v7
        with:
          name: mpv-android-arm64-v8a-release
          path: app/build/outputs/apk/default/release/app-default-arm64-v8a-release-signed.apk
