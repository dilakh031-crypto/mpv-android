name: build

on:
  - push
  - pull_request

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Export env vars
        run: |
          buildscripts/include/ci.sh export >>$GITHUB_ENV
          echo "APK_UNSIGNED=app/build/outputs/apk/default/release/app-default-arm64-v8a-release-unsigned.apk" >>$GITHUB_ENV
          echo "APK_SIGNED=app/build/outputs/apk/default/release/app-default-arm64-v8a-release-signed.apk" >>$GITHUB_ENV

      - uses: actions/cache@v5
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}-arm64"
          enableCrossOsArchive: true

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install autoconf pkgconf libtool ninja-build python3-pip gperf
          sudo pip3 install meson

      - name: Download deps
        run: |
          cd buildscripts
          . ./include/depinfo.sh
          export WGET="wget --progress=bar:force"
          cache_id="${ci_tarball}-arm64"

          if [[ -n "$ANDROID_HOME" && -d "$ANDROID_HOME" ]]; then
            mkdir -p sdk
            ln -sv "$ANDROID_HOME" sdk/android-sdk-linux
          fi

          IN_CI=1 ./include/download-sdk.sh

          mkdir -p deps/mpv
          $WGET https://github.com/mpv-player/mpv/archive/master.tar.gz -O master.tgz
          tar -xzf master.tgz -C deps/mpv --strip-components=1
          rm master.tgz

          mkdir -p prefix "$CACHE_FOLDER"
          if [[ -f "$CACHE_FOLDER/id.txt" ]] && [[ "$(cat "$CACHE_FOLDER/id.txt")" == "$cache_id" ]]; then
            tar -xzf "$CACHE_FOLDER/data.tgz" -C prefix
          else
            IN_CI=1 ./include/download-deps.sh
            ./buildall.sh --arch arm64 --only-deps mpv
            tar -cvzf "$CACHE_FOLDER/data.tgz" -C prefix .
            echo "$cache_id" >"$CACHE_FOLDER/id.txt"
          fi
        env:
          CACHE_MODE: "folder"
          CACHE_FOLDER: "${{ github.workspace }}/gh-cache"

      - name: Build default arm64-v8a release
        run: |
          buildscripts/buildall.sh --arch arm64 -n mpv || {
            [ ! -f buildscripts/deps/mpv/_build-arm64/config.h ] && cat buildscripts/deps/mpv/_build-arm64/meson-logs/meson-log.txt
            exit 1
          }

          . buildscripts/include/path.sh
          perl -0pi -e 's/universalApk\s+true/universalApk false/' app/build.gradle
          PREFIX64="$PWD/buildscripts/prefix/arm64" ndk-build -C app/src/main -j$cores
          ./gradlew assembleDefaultRelease
          test -f "$APK_UNSIGNED"

      - name: Sign default arm64-v8a release
        if: env.ANDROID_SIGNING_KEY != ''
        run: |
          . buildscripts/include/path.sh
          apksigner="${ANDROID_HOME}/build-tools/${v_sdk_build_tools}/apksigner"
          "$apksigner" sign --ks "${ANDROID_SIGNING_KEY}" \
            --in "$APK_UNSIGNED" --out "$APK_SIGNED"

      - name: Select default arm64-v8a release APK
        run: |
          if [ -f "$APK_SIGNED" ]; then
            echo "APK_TO_UPLOAD=$APK_SIGNED" >>$GITHUB_ENV
          else
            echo "APK_TO_UPLOAD=$APK_UNSIGNED" >>$GITHUB_ENV
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: default arm64-v8a release
          path: "${{ env.APK_TO_UPLOAD }}"
