name: build

on:
  - push
  - pull_request

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Export env vars
        run: |
          cache_identifier="$(buildscripts/include/ci.sh export | sed 's/^CACHE_IDENTIFIER=//')"
          echo "CACHE_IDENTIFIER=${cache_identifier}-arm64-v8a" >>$GITHUB_ENV

      - uses: actions/cache@v5
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}"
          enableCrossOsArchive: true

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install autoconf pkgconf libtool ninja-build python3-pip gperf
          sudo pip3 install meson

      - name: Download deps
        run: |
          set -euo pipefail
          export WGET="wget --progress=bar:force"
          export CACHE_FOLDER="${{ github.workspace }}/gh-cache"
          export CACHE_MODE="folder"
          mkdir -p "$CACHE_FOLDER"

          cd buildscripts
          . ./include/depinfo.sh

          if [[ -n "${ANDROID_HOME:-}" && -d "$ANDROID_HOME" ]]; then
            mkdir -p sdk
            ln -sfn "$ANDROID_HOME" sdk/android-sdk-linux
          fi

          IN_CI=1 ./include/download-sdk.sh

          mkdir -p deps/mpv
          $WGET https://github.com/mpv-player/mpv/archive/master.tar.gz -O master.tgz
          tar -xzf master.tgz -C deps/mpv --strip-components=1
          rm master.tgz

          mkdir -p prefix
          cache_id="${ci_tarball}-arm64-v8a"
          if [[ -f "$CACHE_FOLDER/id.txt" && -f "$CACHE_FOLDER/data.tgz" && "$(cat "$CACHE_FOLDER/id.txt")" == "$cache_id" ]]; then
            tar -xzf "$CACHE_FOLDER/data.tgz" -C prefix
          else
            IN_CI=1 ./include/download-deps.sh
            ./buildall.sh --arch arm64 --only-deps mpv
            tar -czf "$CACHE_FOLDER/data.tgz" -C prefix .
            echo "$cache_id" >"$CACHE_FOLDER/id.txt"
          fi

      - name: Build
        run: |
          set -euo pipefail
          cd buildscripts
          ./buildall.sh --arch arm64 -n mpv || {
            [ ! -f deps/mpv/_build-arm64/config.h ] && cat deps/mpv/_build-arm64/meson-logs/meson-log.txt
            exit 1
          }
          cd ..
          set +u
          . buildscripts/include/path.sh
          set -u
          PREFIX64="${{ github.workspace }}/buildscripts/prefix/arm64" ndk-build -C app/src/main -j"$cores"
          ./gradlew :app:assembleDefaultRelease -Pandroid.injected.build.abi=arm64-v8a
          find app/build/outputs -type f \( -name "*.apk" -o -name "*.aab" \) ! -name "app-default-arm64-v8a-release-unsigned.apk" -delete

      - name: Sign
        env:
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          ANDROID_SIGNING_ALIAS: ${{ secrets.ANDROID_SIGNING_ALIAS }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          set +u
          . buildscripts/include/path.sh
          set -u

          mkdir -p signing
          if [[ -n "${ANDROID_SIGNING_KEY:-}" && -n "${ANDROID_SIGNING_STORE_PASSWORD:-}" ]]; then
            printf '%s' "$ANDROID_SIGNING_KEY" | base64 --decode > signing/release.jks
            keystore="signing/release.jks"
            alias="${ANDROID_SIGNING_ALIAS:-release}"
            storepass="$ANDROID_SIGNING_STORE_PASSWORD"
            keypass="${ANDROID_SIGNING_KEY_PASSWORD:-$ANDROID_SIGNING_STORE_PASSWORD}"
          else
            keystore="signing/private.jks"
            alias="private"
            storepass="android"
            keypass="android"
            keytool -genkeypair -v -keystore "$keystore" -storepass "$storepass" -keypass "$keypass" -alias "$alias" -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=mpv-android,O=GitHub Actions,C=US"
          fi

          unsigned="app/build/outputs/apk/default/release/app-default-arm64-v8a-release-unsigned.apk"
          signed="app/build/outputs/apk/default/release/app-default-arm64-v8a-release-signed.apk"
          test -f "$unsigned"

          apksigner="${ANDROID_HOME}/build-tools/${v_sdk_build_tools}/apksigner"
          "$apksigner" sign --ks "$keystore" --ks-key-alias "$alias" --ks-pass "pass:$storepass" --key-pass "pass:$keypass" --out "$signed" "$unsigned"
          "$apksigner" verify --print-certs "$signed"
          rm -f "$unsigned"
          find app/build/outputs -type f \( -name "*.apk" -o -name "*.aab" \) ! -name "$(basename "$signed")" -delete

      - uses: actions/upload-artifact@v7
        with:
          name: mpv-android-default-arm64-v8a-release
          path: app/build/outputs/apk/default/release/app-default-arm64-v8a-release-signed.apk
          if-no-files-found: error
